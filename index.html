<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-group {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #6c63ff; }

    input[type="datetime-local"] {
      flex: 1;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      color: #555;
      transition: border-color 0.2s;
    }

    input[type="datetime-local"]:focus { border-color: #6c63ff; }

    button.add-btn {
      padding: 11px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button.add-btn:hover { background: #574fd6; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
    }

    .todo-item.done { opacity: 0.5; }
    .todo-item.overdue { border-left: 3px solid #e74c3c; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-item .text {
      font-size: 1rem;
      color: #333;
      word-break: break-word;
      display: block;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-meta {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge.created {
      background: #f0f0ff;
      color: #6c63ff;
    }

    .badge.due {
      background: #fff3e0;
      color: #e67e22;
    }

    .badge.due.overdue {
      background: #fdecea;
      color: #e74c3c;
    }

    .badge.due.soon {
      background: #fff8e1;
      color: #f39c12;
    }

    .todo-item button.delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .todo-item button.delete-btn:hover { color: #e74c3c; }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .footer button:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Todos</h1>

    <div class="input-group">
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="Add a new task…" />
        <button class="add-btn" onclick="addTodo()">Add</button>
      </div>
      <div class="input-row">
        <input type="datetime-local" id="due-input" />
      </div>
    </div>

    <div class="filters">
      <button onclick="setFilter('all')" id="filter-all" class="active">All</button>
      <button onclick="setFilter('active')" id="filter-active">Active</button>
      <button onclick="setFilter('done')" id="filter-done">Done</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="count-label"></span>
      <button onclick="clearDone()">Clear done</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todo-input');
    const dueInput = document.getElementById('due-input');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({
        id: Date.now(),
        text,
        done: false,
        createdAt: new Date().toISOString(),
        dueAt: dueInput.value ? new Date(dueInput.value).toISOString() : null
      });
      input.value = '';
      dueInput.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f) {
      filter = f;
      ['all', 'active', 'done'].forEach(name => {
        document.getElementById('filter-' + name).classList.toggle('active', name === f);
      });
      render();
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function dueStatus(iso) {
      if (!iso) return null;
      const now = Date.now();
      const due = new Date(iso).getTime();
      const diff = due - now;
      if (diff < 0) return 'overdue';
      if (diff < 60 * 60 * 1000) return 'soon';
      return 'upcoming';
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">No tasks here.</li>';
      } else {
        list.innerHTML = visible.map(t => {
          const status = t.dueAt ? dueStatus(t.dueAt) : null;
          const isOverdue = !t.done && status === 'overdue';
          const dueBadgeClass = status === 'overdue' ? 'overdue' : status === 'soon' ? 'soon' : '';
          const dueLabel = status === 'overdue' ? '&#9888; Overdue' : status === 'soon' ? '&#9200; Due soon' : '&#128337;';

          return `
            <li class="todo-item ${t.done ? 'done' : ''} ${isOverdue ? 'overdue' : ''}">
              <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
              <div class="todo-body">
                <span class="text">${escapeHtml(t.text)}</span>
                <div class="todo-meta">
                  ${t.createdAt ? `<span class="badge created">Created: ${formatDate(t.createdAt)}</span>` : ''}
                  ${t.dueAt ? `<span class="badge due ${dueBadgeClass}">${dueLabel} ${formatDate(t.dueAt)}</span>` : ''}
                </div>
              </div>
              <button class="delete-btn" onclick="remove(${t.id})" title="Delete">&#x2715;</button>
            </li>
          `;
        }).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('count-label').textContent =
        `${active} task${active !== 1 ? 's' : ''} left`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
    setInterval(render, 60000);
  </script>
</body>
</html>
